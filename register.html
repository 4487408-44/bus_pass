<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Pass System - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2>Create an Account</h2>
            <p>Sign up to get started.</p>
            
            <form id="authForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter your full name">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" id="registerBtn" class="btn primary-btn">Register</button>
                <button type="button" id="loginBtn" class="btn secondary-btn">Already have an account? Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', (e) => {
            window.location.href = '/login.html';
        });

        document.getElementById('registerBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!username || !email || !password) {
                alert('Please fill in all fields.');
                return;
            }

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert("User registered successfully! Redirecting to login...");
                    window.location.href = '/login.html';
                } else {
                    if (data.error === "User already exists!") {
                        alert("User already registered. Please Login.");
                    } else {
                        alert(data.error || 'An error occurred');
                    }
                }
            } catch (err) {
                alert('Failed to connect to server.');
            }
        });
    </script>
</body>
</html>

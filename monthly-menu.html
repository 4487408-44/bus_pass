<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Passes - Bus Pass Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
            BusPass
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Back to Dashboard</a>
        </div>
    </nav>
    <div class="container">
        <div class="page-header" style="margin-top: 2rem;">
            <h1 class="page-title">Monthly Passes</h1>
            <p class="page-desc">Select your specific category.</p>
        </div>
        <div class="options-grid">
            <a href="pass-action.html" class="option-card" onclick="setPassType('Student')">
                <div class="option-icon">🎓</div>
                <h3 class="option-title">Student Pass</h3>
                <p class="option-desc">Subsidized monthly pass for school and college students.</p>
            </a>
            
            <a href="pass-action.html" class="option-card" onclick="setPassType('Senior Citizen')">
                <div class="option-icon">🧓</div>
                <h3 class="option-title">Senior Citizen</h3>
                <p class="option-desc">Special discounted monthly pass for citizens aged 60+.</p>
            </a>
            <a href="pass-action.html" class="option-card" onclick="setPassType('Normal')">
                <div class="option-icon">👤</div>
                <h3 class="option-title">Normal Passenger</h3>
                <p class="option-desc">Standard monthly commute pass for regular passengers.</p>
            </a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
